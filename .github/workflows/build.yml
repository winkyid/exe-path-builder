name: Build Launcher EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Memungkinkan Anda menjalankan build secara manual kapan saja

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Compile EXE using MSVC
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
        cl.exe /O2 /MT main.cpp /link user32.lib shell32.lib /SUBSYSTEM:WINDOWS /OUT:PeluncurAplikasi.exe

    - name: Upload EXE Artifact
      uses: actions/artifacts@v4
      with:
        name: Peluncur-EXE-Selesai
        path: PeluncurAplikasi.exe
        
